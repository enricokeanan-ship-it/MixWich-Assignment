<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MlxWich — Freshly Made, Fully Yours</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Fredoka:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <!-- HEADER SECTION INI -->
    <nav class="navbar" role="navigation" aria-label="Main navigation">
      <div class="navbar__inner">
        <a href="index.html" class="navbar__logo" aria-label="MlxWich Home">
          <img
            src="./Icon Product/LogoUtama.svg"
            alt="Logo Utama"
            class="navbar__logo-img"
          />
        </a>

        <ul class="navbar__links">
          <li><a href="index.html">Home</a></li>
          <li><a href="menu.html">Menu</a></li>
          <li><a href="events.html">Events</a></li>
          <li><a href="locations.html">Locations</a></li>
        </ul>

        <div class="navbar__actions">
          <a href="register.html" class="navbar__register-btn">
            <span class="register-icon"></span>
            Register
          </a>
        </div>
      </div>
    </nav>
    <main class="register-wrapper">
      <img
        src="./Food Product/Main Product.png"
        alt=""
        class="reg-deco reg-deco-left"
        aria-hidden="true"
      />
      <img
        src="./Food Product/Main Product.png"
        alt=""
        class="reg-deco reg-deco-right"
        aria-hidden="true"
      />

      <div class="register-container">
        <h2 class="register-title">CREATE ACCOUNT</h2>

        <form
          id="registration-form"
          onsubmit="
            event.preventDefault();
            validateData();
          "
        >
          <div class="form-group">
            <label for="fullname" class="form-label">Full Name</label>
            <input
              type="text"
              id="fullname"
              class="form-input"
              placeholder="Please enter your full name correctly."
            />
          </div>

          <div class="form-group">
            <label for="phone" class="form-label">Phone Number</label>
            <input
              type="text"
              id="phone"
              class="form-input"
              placeholder="Please enter your phone number correctly."
            />
          </div>

          <div class="form-group">
            <label for="email" class="form-label">Email Address</label>
            <input
              type="text"
              id="email"
              class="form-input"
              placeholder="Please enter your email address correctly."
            />
          </div>

          <div class="form-group">
            <label for="favorite-item" class="form-label"
              >Pick your favorite item</label
            >
            <select id="favorite-item" class="form-input form-select">
              <option value="" disabled selected>
                Please pick an item of MlxWich.
              </option>
              <option value="Fire Chicken Melt">Fire Chicken Melt</option>
              <option value="Honey Mustard Chicken">
                Honey Mustard Chicken
              </option>
              <option value="Beef Crunch Deluxe">Beef Crunch Deluxe</option>
              <option value="Turkey Avocado">Turkey Avocado</option>
              <option value="Veggie Garden">Veggie Garden</option>
              <option value="Spicy Tuna">Spicy Tuna</option>
              <option value="Soft Drinks">Soft Drinks</option>
              <option value="Mineral Water">Mineral Water</option>
            </select>
          </div>

          <div class="form-group">
            <label for="address" class="form-label">Address</label>
            <input
              type="text"
              id="address"
              class="form-input"
              placeholder="Please enter your home address."
            />
          </div>

          <div class="form-group checkbox-group-wrapper">
            <label class="checkbox-container">
              <input type="checkbox" id="terms" class="custom-checkbox-input" />
              <span class="custom-checkbox"></span>
              <span class="checkbox-text"
                >I agree to the terms and conditions.</span
              >
            </label>

            <label class="checkbox-container">
              <input
                type="checkbox"
                id="privacy"
                class="custom-checkbox-input"
              />
              <span class="custom-checkbox"></span>
              <span class="checkbox-text"
                >I agree to the privacy and policy.</span
              >
            </label>
          </div>

          <button type="submit" class="btn-submit-register">REGISTER</button>
        </form>
      </div>
    </main>
    <!-- ============================================================
    FOOTER
    ============================================================ -->
    <footer class="footer" role="contentinfo">
      <div class="footer__inner">
        <div class="footer__brand">
          <a href="index.html">
            <img
              src="./Icon Product/LogoFooter.png"
              alt="MlxWich Logo"
              class="footer__logo-img"
            />
          </a>
          <p class="footer__copy">@2020 Powered by MlxWich</p>
        </div>

        <div class="footer__col">
          <p class="footer__col-title">QUICK LINKS</p>
          <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="menu.html">Menu</a></li>
            <li><a href="events.html">Events</a></li>
            <li><a href="locations.html">Locations</a></li>
            <li><a href="register.html">Register</a></li>
          </ul>
        </div>

        <div class="footer__col">
          <p class="footer__col-title">INFORMATIONS</p>
          <ul>
            <li><a href="about.html">About Us</a></li>
            <li><a href="faq.html">FAQ</a></li>
            <li><a href="terms.html">T &amp; C</a></li>
          </ul>
        </div>

        <div class="footer__hotline-wrap">
          <img
            src="./Icon Product/HotLine.png"
            alt="Hotline"
            class="footer__hotline-img"
          />
        </div>
      </div>
    </footer>
    <script src="./main.js"></script>
    <script src="./validationForm.js"></script>
  </body>
</html>
